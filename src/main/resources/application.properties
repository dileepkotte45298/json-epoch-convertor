spring.application.name=json-date-transformer
server.port=8080

# Virtual threads (Java 21) — handles thousands of concurrent requests efficiently
spring.threads.virtual.enabled=true

# Allow large JSON payloads up to 50MB
server.tomcat.max-http-form-post-size=52428800
server.tomcat.max-swallow-size=52428800
spring.mvc.async.request-timeout=60000

# GZIP compression — reduces payload size over the wire
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain
server.compression.min-response-size=1024

# Tomcat thread tuning
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
