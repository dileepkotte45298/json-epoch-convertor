<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Epoch Converter — jsonepochconverter.org</title>
    <meta name="description" content="Convert epoch timestamps inside JSON to human-readable dates. Supports any timezone and date format." />
    <meta name="keywords" content="json epoch converter, unix timestamp, epoch to date, json date transform" />
    <link rel="canonical" href="https://jsonepochconverter.org/" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="brand-row">
                <div class="brand-left">
                    <div class="brand-title">JSON Epoch Converter</div>
                </div>
                <a class="btn-kofi" href="https://ko-fi.com/jsonepochconverter" target="_blank" rel="noopener noreferrer">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M23.881 8.948c-.773-4.085-4.859-4.593-4.859-4.593H.723c-.604 0-.679.798-.679.798s-.082 7.324-.022 11.822c.164 2.424 2.586 2.672 2.586 2.672s8.267-.023 11.966-.049c2.438-.426 2.683-2.566 2.658-3.734 4.352.24 7.422-2.831 6.649-6.916zm-11.062 3.511c-1.246 1.453-4.011 3.976-4.011 3.976s-.121.119-.31.023c-.076-.057-.108-.09-.108-.09-.443-.441-3.368-3.049-4.034-3.954-.709-.965-1.041-2.7-.091-3.71.951-1.01 3.005-1.086 4.363.407 0 0 1.565-1.782 3.468-.963 1.904.82 1.832 2.692.723 4.311zm6.173.478c-.928.116-1.682.028-1.682.028V7.284h1.77s1.971.551 1.971 2.638c0 1.913-.985 2.667-2.059 3.015z"/>
                    </svg>
                    Support
                </a>
                <button class="btn-share" id="shareBtn" title="Copy link to clipboard">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                    Share
                </button>
            </div>
        </header>

        <div class="epoch-bar">
            <span class="epoch-bar-label">Current Epoch</span>
            <span class="epoch-bar-divider">|</span>
            <span class="epoch-bar-item">
                <span class="epoch-bar-unit">Seconds</span>
                <span id="epochSeconds" class="epoch-bar-value">—</span>
                <button class="btn-epoch-copy" id="copyEpochSeconds" title="Copy seconds">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
            </span>
            <span class="epoch-bar-divider">|</span>
            <span class="epoch-bar-item">
                <span class="epoch-bar-unit">Milliseconds</span>
                <span id="epochMillis" class="epoch-bar-value">—</span>
                <button class="btn-epoch-copy" id="copyEpochMillis" title="Copy milliseconds">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
            </span>
        </div>

        <main class="main-grid">
            <section class="panel panel-editor">
                <div class="panel-head panel-head-right">
                    <span>Input JSON</span>
                    <div class="panel-head-actions">
                    <button class="btn-copy-input" id="copyInputBtn" title="Copy input JSON">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                        </svg>
                    </button>
                    <label class="btn-upload-label" title="Upload a .json file">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        Upload JSON
                        <input type="file" id="fileInput" accept=".json,application/json" style="display:none" />
                    </label>
                    </div>
                </div>
                <div class="panel-body" id="dropZone">
                    <div id="dropOverlay" class="drop-overlay hidden">Drop JSON file here</div>
                    <textarea id="jsonInput" placeholder='Paste your JSON here, or upload / drop a .json file&#10;{&#10;  "user": "alice",&#10;  "created_at": 1712345678,&#10;  "updated_at": 1712445678000&#10;}'></textarea>
                    <div id="jsonHint" class="hint-text hidden"></div>
                </div>
                <div class="card card-orange">
                    <div class="card-label">Epoch Fields</div>
                    <button class="btn-detect" id="detectBtn">Auto-detect fields</button>
                    <div id="fieldChips" class="field-chips-area">
                        <span class="placeholder-text">No fields selected yet</span>
                    </div>
                    <div class="manual-row">
                        <input type="text" id="manualField" placeholder="Custom path e.g. data.ts" />
                        <button class="btn-add" id="addFieldBtn">+ Add</button>
                    </div>
                </div>
            </section>

            <section class="panel panel-controls">
                <div class="card card-teal">
                    <div class="card-label">Timezone</div>
                    <input type="text" id="timezoneSearch" placeholder="Search timezone..." />
                    <select id="timezoneSelect">
                        <option value="UTC">UTC</option>
                    </select>
                </div>

                <div class="card card-orange">
                    <div class="card-label">Date Format</div>
                    <input type="text" id="dateFormat" value="yyyy-MM-dd HH:mm:ss z" placeholder="yyyy-MM-dd HH:mm:ss z" />
                    <div class="format-presets">
                        <button class="btn-preset" data-fmt="yyyy-MM-dd HH:mm:ss z">Default</button>
                        <button class="btn-preset" data-fmt="MM/dd/yyyy hh:mm a z">US</button>
                        <button class="btn-preset" data-fmt="dd-MM-yyyy HH:mm:ss">EU</button>
                        <button class="btn-preset" data-fmt="yyyy-MM-dd'T'HH:mm:ssXXX">ISO 8601</button>
                    </div>
                </div>

                <div class="action-row">
                    <button class="btn-transform" id="transformBtn">
                        Transform
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>
                    <button class="btn-clear" id="clearJsonBtn">Clear</button>
                </div>
            </section>

            <section class="panel panel-output">
                <div class="panel-head panel-head-right">
                    <span>Code</span>
                    <div class="output-top-actions">
                        <span id="transformedCount" class="badge hidden"></span>
                        <button class="btn-out" id="expandAllBtn" disabled>Expand All</button>
                        <button class="btn-out" id="collapseAllBtn" disabled>Collapse All</button>
                    </div>
                </div>
                <div id="outputArea" class="output-area">
                    <div class="output-placeholder">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke-width="1.5">
                            <polyline points="16 18 22 12 16 6"/>
                            <polyline points="8 6 2 12 8 18"/>
                        </svg>
                        <p>Output appears here after transform...</p>
                    </div>
                </div>
                <div id="errorBanner" class="error-banner hidden"></div>
                <div class="output-btn-row">
                    <button class="btn-copy" id="copyBtn" disabled>Copy JSON</button>
                    <button class="btn-dl" id="downloadBtn" disabled>Download</button>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
